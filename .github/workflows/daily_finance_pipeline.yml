name: Daily Finance Pipeline

on:
  schedule:
    # Führt die Pipeline jeden Tag um 05:00 UTC aus
    - cron: '0 5 * * *'
  workflow_dispatch: # Ermöglicht manuelles Triggern über das GitHub-UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Großzügiges Limit für Scraping & Berechnungen
    
    # Erlaubt dem github-actions[bot] das Schreiben im Repo
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Holt die gesamte Historie, wichtig für saubere Rebase-Operationen

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Nutzt Caching für schnellere Builds bei täglichem Run

      - name: Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pipeline ausführen (Daten holen)
        env:
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: python main.py # Generiert CSVs im data/ Ordner

      - name: Newsletter & Dashboard generieren
        env:
          MAIL_SENDER:   ${{ secrets.MAIL_SENDER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: python newsletter.py # Baut HTML-Seiten in docs/ und versendet Mails

      - name: Alles zu GitHub pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Speicher-Optimierung gegen speicherintensive Git-Abstürze (SIGKILL)
          git config --global pack.windowMemory "100m"
          git config --global pack.packSizeLimit "100m"
          git config --global core.bigFileThreshold "50m"
          
          # 1. Lokale Änderungen sicher stashen (inkl. neuer, untrackter Files)
          git stash --include-untracked
          
          # 2. Remote-Updates holen und lokal draufrebasen
          git pull --rebase origin main
          
          # 3. Die frisch generierten Dateien wieder zurückholen
          git stash pop || echo "Kein Stash zum Zurückspielen vorhanden oder Konflikt automatisch gelöst"
          
          # AUTOMATISCHER CLEANUP ALTER DATENSÄTZE IN "data/"
          # Behält die 3 neuesten Dateien im data/-Ordner und löscht alle älteren aus Git.
          if [ -d "data" ]; then
            echo "🧹 Starte Bereinigung alter Datensätze..."
            ls -1tr data/* 2>/dev/null | head -n -3 | while read -r alte_datei; do
              echo "🗑️ Lösche alte Datei aus Git: $alte_datei"
              git rm -f "$alte_datei"
            done
          fi
          
          # 4. Alle modifizierten Verzeichnisse tracken
          git add data/ docs/
          if [ -d "assets" ]; then git add assets/; fi
          
          # 5. Nur committen wenn sich wirklich etwas verändert hat
          if ! git diff --cached --quiet; then
            git commit -m "Daily update: $(date +'%Y-%m-%d') [skip ci]"
            git push origin main
          else
            echo "Keine neuen Daten oder Dashboard-Änderungen festgestellt."
          fi

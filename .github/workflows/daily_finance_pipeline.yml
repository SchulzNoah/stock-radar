name: Daily Finance Pipeline

on:
  schedule:
    # Führt die Pipeline jeden Tag um 05:00 UTC aus
    - cron: '0 5 * * *'
  workflow_dispatch: # Ermöglicht manuelles Triggern über das GitHub-UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Großzügiges Limit für Scraping & Berechnungen

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Holt die gesamte Historie, wichtig für saubere Rebase-Operationen

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Nutzt Caching für schnellere Builds bei täglichem Run

      - name: Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pipeline ausführen (Daten holen)
        env:
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: python main.py # Generiert CSVs im data/ Ordner

      - name: Newsletter & Dashboard generieren
        env:
          MAIL_SENDER:   ${{ secrets.MAIL_SENDER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: python newsletter.py # Baut HTML-Seiten in docs/ und versendet Mails

      - name: Alles zu GitHub pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Erst den neuesten Stand holen, um Konflikte zu vermeiden
          git pull --rebase origin main
          
          # Alle modifizierten Verzeichnisse tracken (inkl. Assets für das Logo falls außerhalb von docs/)
          git add data/ docs/
          if [ -d "assets" ]; then git add assets/; fi
          
          # Nur committen, wenn sich in data/, docs/ oder assets/ wirklich etwas verändert hat
          if ! git diff --cached --quiet; then
            git commit -m "Daily update: $(date +'%Y-%m-%d') [skip ci]"
            git push origin main
          else
            echo "Keine neuen Daten oder Dashboard-Änderungen (KGV) festgestellt."
          fi

name: Test Newsletter & Dashboard

on:
  workflow_dispatch: # Nur manuelles Triggern für Testzwecke

jobs:
  test-run:
    runs-on: ubuntu-latest
    
    # DIESER BLOCK FEHLTE: Erlaubt dem github-actions[bot] das Schreiben im Repo
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Testlauf ausführen
        env:
          MAIL_SENDER:   ${{ secrets.MAIL_SENDER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: python newsletter.py # Führt das Skript im Testmodus aus (erzeugt Artefakte für docs/)

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Lokale Änderungen (Dashboard-Generierung) sicher stashen (inklusive neuer, untrackter Files)
          git stash --include-untracked
          
          # 2. Remote-Updates holen und lokal draufrebasen
          git pull --rebase origin main
          
          # 3. Das frisch generierte Dashboard und die Testdaten wieder zurückholen
          git stash pop || echo "Kein Stash zum Zurückspielen vorhanden oder Konflikt automatisch gelöst"
          
          # 4. Jetzt erst alle Änderungen für den Commit markieren
          git add docs/ data/
          if [ -d "assets" ]; then git add assets/; fi
          
          # 5. Saubere Prüfung des Index vor dem Commit
          if ! git diff --cached --quiet; then
            git commit -m "Test update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          else
            echo "Der Testlauf hat keine visuellen oder datentechnischen Änderungen erzeugt."
          fi

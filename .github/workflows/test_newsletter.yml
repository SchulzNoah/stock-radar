name: Test Newsletter & Dashboard

on:
  workflow_dispatch: # Nur manuelles Triggern für Testzwecke

jobs:
  test-run:
    runs-on: ubuntu-latest
    
    # Erlaubt dem github-actions[bot] das Schreiben im Repo
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Testlauf ausführen
        env:
          MAIL_SENDER:   ${{ secrets.MAIL_SENDER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: python newsletter.py # Führt das Skript im Testmodus aus (erzeugt Artefakte für docs/ und data/)

      - name: Änderungen committen & aufräumen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Speicher-Optimierung gegen speicherintensive Git-Abstürze (SIGKILL)
          git config --global pack.windowMemory "100m"
          git config --global pack.packSizeLimit "100m"
          git config --global core.bigFileThreshold "50m"
          
          # 1. Lokale Änderungen (Dashboard & Testdaten) sicher stashen (inklusive untracked Files)
          git stash --include-untracked
          
          # 2. Remote-Updates holen und lokal draufrebasen
          git pull --rebase origin main
          
          # 3. Das frisch generierte Dashboard und die Testdaten wieder zurückholen
          git stash pop || echo "Kein Stash zum Zurückspielen vorhanden oder Konflikt automatisch gelöst"
          
          # 4. AUTOMATISCHER CLEANUP ALTER DATENSÄTZE IN "data/"
          # Behält die 3 neuesten Dateien im data/-Ordner und löscht alle älteren aus Git.
          if [ -d "data" ]; then
            echo "🧹 Starte Bereinigung alter Test-Datensätze..."
            ls -1tr data/* 2>/dev/null | head -n -3 | while read -r alte_datei; do
              echo "🗑️ Lösche alte Datei aus Git: $alte_datei"
              git rm -f "$alte_datei"
            done
          fi
          
          # 5. Jetzt alle verbleibenden Änderungen für den Commit markieren
          git add docs/ data/
          if [ -d "assets" ]; then git add assets/; fi
          
          # 6. Saubere Prüfung des Index vor dem Commit
          if ! git diff --cached --quiet; then
            git commit -m "Test update & cleanup: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          else
            echo "Der Testlauf hat keine visuellen oder datentechnischen Änderungen erzeugt."
          fi

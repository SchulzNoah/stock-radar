name: Daily Finance Pipeline

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 8 Uhr Berliner Zeit (Sommerzeit)
  workflow_dispatch:         # Manueller Start zum Testen

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write        # Erlaubt dem Bot in dein Repo zu pushen

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Pipeline ausführen
        run: python main.py

      - name: CSVs zu GitHub pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d')"
          git push
